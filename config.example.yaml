# Copy to config.yaml and edit. config.yaml is gitignored.
# Secrets are NOT here; set GOOGLE_MAPS_KEY and DISCORD_WEBHOOK_URL in the env.

home:
  lat: 0.0          # your home latitude
  lon: 0.0          # your home longitude

station:
  lat: 0.0          # your MNR station latitude (the drive destination)
  lon: 0.0          # your MNR station longitude

stops:
  # The two MNR stations you commute between. id is the GTFS stop_id from the
  # static feed (download the zip and grep stops.txt). label is whatever you
  # want shown on the dashboard for that stop.
  home:
    id: "0"
    label: "Home"
  work:
    id: "1"
    label: "Work"

subway:
  # Subway route id from the MTA realtime feeds. Pick the route you ride between
  # the MNR station and your office.
  routeId: ""
  # Optional: only show alerts touching these subway stops (plus line-wide
  # alerts). Leave empty to see every alert for `routeId`.
  stopIds: []
  # Optional: per-direction next-arrival countdown. stopId is the GTFS stop_id
  # at the platform you board on (NYCT encodes platform via trailing N/S);
  # directionId is the trip's GTFS direction_id (0 or 1). Leave stopId empty
  # to hide that direction's countdown.
  outbound:
    stopId: ""
    directionId: 0
  inbound:
    stopId: ""
    directionId: 0

feeds:
  # Keyless MTA feeds. VERIFY against current MTA developer docs; URLs have
  # changed historically. These are the expected endpoints as of writing.
  mnrStaticGtfs: "http://web.mta.info/developers/data/mnr/google_transit.zip"
  mnrRealtime: "https://api-endpoint.mta.info/Dataservice/mtagtfsfeeds/mnr%2Fgtfs-mnr"
  subwayAlerts: "https://api-endpoint.mta.info/Dataservice/mtagtfsfeeds/camsys%2Fsubway-alerts"
  # Route-group-specific GTFS-realtime trip-updates feed for the subway
  # countdown. Pick the URL matching your subway.routeId from current MTA
  # developer docs. Empty disables the countdown.
  subwayRealtime: ""

weather:
  # NWS requires a descriptive User-Agent with contact info.
  userAgent: "commute-helper (you@example.com)"

trainsToShow: 3
refreshSeconds: 45
dashboardUrl: "http://localhost:8080"

nudges:
  morning: "07:00"
  evening: "17:00"

timezone: "America/New_York"

# Local time-of-day cutoff for swapping the dashboard panel order. Before this
# time, the Outbound (home -> work) panel is on top; at or after, Inbound is
# on top. Empty string disables the swap.
eveningSwitchAt: "12:00"

server:
  addr: ":8080"

# Minutes before the MNR departure to leave for the train, per direction.
# Both default to 0 (no leave-by hint shown).
leaveBeforeTrainMinutes:
  outbound: 0     # home -> work: leave home this many minutes before MNR.
  inbound: 0      # work -> home: leave work this many minutes before MNR.

# Expected boarding track per stop key (`home` or `work`). When the realtime
# feed posts a different track, the dashboard shows a warning. Empty or
# missing entries disable the comparison.
expectedTracks: {}
